name: Go

on:
  push:
  pull_request:
    branches: [ 'develop' ]

permissions:
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./... && go test ./...

    - name: Generate coverage report
      run: go tool cover -func=coverage.out

    - name: Extract coverage percentage
      if: github.event_name == 'pull_request'
      id: coverage
      run: |
        COVERAGE=$(go test -cover ./ | grep -oP 'coverage: \K[\d.]+%')
        echo "percent=$COVERAGE" >> $GITHUB_OUTPUT

    - name: Find coverage comment
      if: github.event_name == 'pull_request'
      uses: peter-evans/find-comment@v3
      id: fc
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: 'github-actions[bot]'
        body-includes: 'Code Coverage Report'

    - name: Create or update coverage comment
      if: github.event_name == 'pull_request'
      uses: peter-evans/create-or-update-comment@v5
      with:
        comment-id: ${{ steps.fc.outputs.comment-id }}
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          ## Code Coverage Report
          
          **Total Coverage:** ${{ steps.coverage.outputs.percent }}
          
          Generated from commit: ${{ github.sha }}
          **Repository:** ${{ github.repository }}
        edit-mode: replace
